<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>HTML to Image</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="editor-container">
        <textarea id="html-input" placeholder="HTML 코드를 입력하세요"></textarea>
        <textarea id="css-input" placeholder="CSS 코드를 입력하세요"></textarea>
    </div>

    <div class="control-bar">
        <div class="control-group">
            <label for="width-preset">캡처 너비</label>
            <select id="width-preset">
                <option value="auto">자동 (내용 크기에 맞춤)</option>
                <option value="600">600px · 모바일 / 뉴스레터</option>
                <option value="800" selected>800px · 블로그 본문</option>
                <option value="1080">1080px · SNS 정방형</option>
                <option value="1200">1200px · 데스크탑 기본</option>
                <option value="1920">1920px · 풀 HD</option>
                <option value="custom">직접 입력</option>
            </select>
            <input type="number" id="custom-width" value="800" min="100" max="4000" step="10" disabled>
            <span class="unit">px</span>
        </div>

        <div class="control-group">
            <label for="margin-size">흰 배경 여백</label>
            <input type="number" id="margin-size" value="60" min="0" max="400" step="10">
            <span class="unit">px</span>
        </div>

        <div class="control-group">
            <label for="preview-white">
                <input type="checkbox" id="preview-white"> 여백까지 미리보기
            </label>
        </div>
    </div>

    <div class="button-container">
        <button onclick="updatePreview()">미리보기 적용</button>
        <button onclick="saveAsPng(false)">투명 배경으로 저장</button>
        <button onclick="saveAsPng(true)">흰 배경 + 여백으로 저장</button>
    </div>

    <style id="dynamic-style"></style>

    <div id="preview-wrapper">
        <div id="capture-area"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
